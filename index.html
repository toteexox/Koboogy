	"11": {
            "mystory": {
                title: "Boot camp",
                audio: "audio/11 My Story.wav",
                sentences: [
                    { start: 7.010, end: 9.120, ipa: "/ˈoʊnli wʌn wiːk lɛft ɪn ðə ˈbuːtkæmp/", trans: "부트캠프가 이제 일주일밖에 안 남았네!", chunks: [{ text: "Only one week", s: 7.010, e: 7.730 }, { text: "left in the boot camp", s: 7.730, e: 9.120 }] },
                    { start: 9.120, end: 10.790, ipa: "/haʊ duː juː fiːl/", trans: "기분이 어때?", chunks: [{ text: "How do you feel?", s: 9.120, e: 10.790 }] },
                    { start: 10.790, end: 13.920, ipa: "/ˈɑːnɪstli, aɪ ˈnɛvər θɔːt aɪ wʊd kʌm ðɪs fɑːr/", trans: "솔직히 내가 여기까지 올 줄은 전혀 생각 못했어.", chunks: [{ text: "Honestly, I never thought I would", s: 10.790, e: 12.430 }, { text: "come this far", s: 12.430, e: 13.920 }] },
                    { start: 13.920, end: 17.700, ipa: "/bɪˈfɔːr ðə ˈbuːtkæmp, aɪ ɡeɪv ʌp ɑːn ˈɪŋɡlɪʃ soʊ ˈmɛni taɪmz/", trans: "부트캠프 전에는 영어를 여러 번 포기했거든.", chunks: [{ text: "Before the boot camp,", s: 13.920, e: 15.050 }, { text: "I gave up on", s: 15.050, e: 15.780 }, { text: "English so many times", s: 15.780, e: 17.700 }] },
                    { start: 17.700, end: 21.310, ipa: "/aɪ wʌz ˈkɑːnstəntli ˈlʊkɪŋ fɔːr ə ˈʃɔːrtkʌt tuː bɪˈkʌmɪŋ ˈfluːənt/", trans: "항상 빨리 유창해질 수 있는 쉬운 방법만 찾았어.", chunks: [{ text: "I was constantly", s: 17.700, e: 18.530 }, { text: "looking for a shortcut", s: 18.530, e: 19.540 }, { text: "to becoming fluent", s: 19.540, e: 21.310 }] },
                    { start: 21.310, end: 28.160, ipa: "/bʌt ˈdʊrɪŋ ðə ˈbuːtkæmp, aɪ ˈriːəˌlaɪzd ɪts nɑːt əˈbaʊt ðə ˈmɛθəd. ɪts əˈbaʊt ˈpʊtɪŋ ɪn ðə ˈɛfərt ænd ˈnɛvər ˈɡɪvɪŋ ʌp/", trans: "근데 부트캠프를 하면서 중요한 건 방법이 아니라는 걸 깨달았지. 중요한 건 꾸준히 노력하고 포기하지 않는 거야.", chunks: [{ text: "But during the boot camp,", s: 21.310, e: 22.560 }, { text: "I realized it's not about the method,", s: 22.560, e: 24.880 }, { text: "it's about putting in the effort", s: 24.880, e: 26.280 }, { text: "and never giving up", s: 26.280, e: 28.160 }] },
                    { start: 28.160, end: 33.340, ipa: "/ˈlʊkɪŋ bæk, ðɛr ɑːr θɪŋz aɪ kʊd hæv dʌn ˈdɪfrəntli, laɪk aɪ ʃʊd hæv biːn mɔːr kənˈsɪstənt/", trans: "돌아보면 좀 이랬으면 어땠을까 하는 것도 있어. 예를 들면 좀 더 꾸준히 할 걸 하는 아쉬움 같은 거.", chunks: [{ text: "Looking back", s: 28.160, e: 29.020 }, { text: "There are things I", s: 29.020, e: 29.650 }, { text: "could have done differently,", s: 29.650, e: 31.070 }, { text: "like I should have been", s: 31.070, e: 31.770 }, { text: "more consistent", s: 31.770, e: 33.340 }] },
                    { start: 33.340, end: 37.200, ipa: "/bʌt kəmˈpɛrd tuː wiːk wʌn, maɪ ˈɪŋɡlɪʃ hæz ˈdɛfɪnətli ɪmˈpruːvd/", trans: "그래도 1주 차랑 비교하면 내 영어는 확실히 성장했어.", chunks: [{ text: "But compared to week one,", s: 33.340, e: 34.720 }, { text: "my English has definitely improved", s: 34.720, e: 37.200 }] },
                    { start: 37.200, end: 41.640, ipa: "/aɪ lɜːrnd ðə raɪt weɪ tuː ˈstʌdi, ænd aɪm lɛs ˈnɜːrvəs tuː spiːk tuː ˈfɔːrənərz/", trans: "올바른 공부법을 배웠고, 이제 외국인한테 말할 때도 덜 긴장돼.", chunks: [{ text: "I learned the right way to study,", s: 37.200, e: 38.920 }, { text: "and I'm less nervous to", s: 38.920, e: 39.920 }, { text: "speak to foreigners", s: 39.920, e: 41.640 }] },
                    { start: 41.640, end: 46.130, ipa: "/ðə moʊst ɪmˈpɔːrtnt θɪŋ ɪz naʊ aɪ hæv ðə ˈkɜːrɪdʒ tuː pərˈsuː maɪ driːmz/", trans: "제일 중요한 건 이제 내 꿈을 쫓을 용기가 생겼다는 거야!", chunks: [{ text: "The most important thing", s: 41.640, e: 42.740 }, { text: "is now I have the courage", s: 42.740, e: 43.940 }, { text: "to pursue my dreams!", s: 43.940, e: 46.130 }] }
                ]
            },
            "realconvo": {

                    { speaker: "B", start: 7.580, end: 8.900, ipa: "/tɛl miː əˈbaʊt ɪt/", trans: "내 말이.", chunks: [{ text: "Tell me about it", s: 7.580, e: 8.900 }] },
                    { speaker: "B", start: 8.900, end: 13.890, ipa: "/ˈwɜːrkɪŋ ænd ˈstʌdiɪŋ æt ðə seɪm taɪm wɑːznt ˈiːzi, bʌt ˈsʌmhaʊ aɪ meɪd ɪt ðɪs fɑːr/", trans: "일하면서 공부까지 하는 게 쉽진 않았는데, 어떻게 여기까지 왔네.", chunks: [{ text: "Working and studying at the same time", s: 8.900, e: 10.570 }, { text: "wasn't easy,", s: 10.570, e: 11.460 }, { text: "but somehow I made it this far", s: 11.460, e: 13.890 }] },

                    { speaker: "B", start: 16.580, end: 20.220, ipa: "/fɔːr ʃʊr, bʌt aɪm praʊd ʌv maɪˈsɛlf fɔːr nɑːt ˈɡɪvɪŋ ʌp/", trans: "맞아. 그래도 포기 안 한 내가 대견해.", chunks: [{ text: "For sure,", s: 16.580, e: 17.730 }, { text: "but I'm proud of myself", s: 17.730, e: 18.680 }, { text: "for not giving up", s: 18.680, e: 20.220 }] },
                    { speaker: "B", start: 20.220, end: 24.160, ipa: "/ˈɑːnɪstli, aɪ kiːp ˈθɪŋkɪŋ aɪ ʃʊd hæv dʒɔɪnd ðɪs ˈbuːtkæmp ˈɜːrliər/", trans: "솔직히 부트캠프 진작 시작할걸 그랬다는 생각이 계속 들어.", chunks: [{ text: "Honestly, I keep thinking I should have joined", s: 20.220, e: 22.320 }, { text: "this boot camp earlier", s: 22.320, e: 24.160 }] },
                    { speaker: "A", start: 24.160, end: 25.570, ipa: "/seɪm hɪər/", trans: "나도 그래.", chunks: [{ text: "Same here", s: 24.160, e: 25.570 }] },
                    { speaker: "A", start: 25.570, end: 30.210, ipa: "/ɪf aɪ hæd noʊn əˈbaʊt ɪt bɪˈfɔːr, aɪ ˈwʊdnt hæv ˈweɪstɪd soʊ mʌtʃ taɪm ænd ˈmʌni/", trans: "이걸 진작 알았더라면 시간도 돈도 덜 낭비했을 텐데.", chunks: [{ text: "If I had known about it before", s: 25.570, e: 27.360 }, { text: "I wouldn't have wasted", s: 27.360, e: 28.250 }, { text: "so much time and money", s: 28.250, e: 30.210 }] },
                    { speaker: "B", start: 30.210, end: 32.670, ipa: "/wʌt wʌz ðə bɛst pɑːrt fɔːr juː/", trans: "너한테는 뭐가 제일 좋았어?", chunks: [{ text: "What was the best part for you?", s: 30.210, e: 32.670 }] },
                    { speaker: "A", start: 32.670, end: 34.690, ipa: "/ˈdɛfɪnətli ðə laɪv ˈklæsɪz/", trans: "무조건 라이브 수업이지.", chunks: [{ text: "Definitely the live classes", s: 32.670, e: 34.690 }] },
                    { speaker: "A", start: 34.690, end: 36.670, ipa: "/aɪ ˈɔːlsoʊ lʌv maɪ ˈstʌdi ɡruːp/", trans: "그리고 스터디 그룹도 진짜 좋았어.", chunks: [{ text: "I also love my study group", s: 34.690, e: 36.670 }] },
                    { speaker: "A", start: 36.670, end: 39.710, ipa: "/wɪˈðaʊt ðɛm, aɪ wʊd hæv kwɪt ɔːlˈrɛdi/", trans: "스터디 멤버가 없었으면 벌써 포기했을 거야.", chunks: [{ text: "Without them, I would have", s: 36.670, e: 37.860 }, { text: "quit already", s: 37.860, e: 39.710 }] },
                    { speaker: "B", start: 39.710, end: 42.270, ipa: "/aɪ ɡɛs aɪ ʃʊd hæv dʒɔɪnd ə ˈstʌdi ɡruːp tuː/", trans: "나도 스터디 그룹에 들어갈걸 그랬네.", chunks: [{ text: "I guess I should have", s: 39.710, e: 40.450 }, { text: "joined a study group too", s: 40.450, e: 42.270 }] },

                    { speaker: "A", start: 44.770, end: 46.820, ipa: "/heɪ, ɪts dʒʌst ðə bɪˈɡɪnɪŋ/", trans: "야, 이제 시작이잖아.", chunks: [{ text: "Hey, it's just the beginning", s: 44.770, e: 46.820 }] },
                    { speaker: "A", start: 46.820, end: 49.950, ipa: "/ˈaʊər ɡruːp dʒʌst dɪˈsaɪdɪd tuː ˈstʌdi fɔːr əˈnʌðər θriː mʌnθs/", trans: "우리 그룹에서 앞으로 3개월 더 공부하기로 방금 결정했거든.", chunks: [{ text: "Our group just decided to", s: 46.820, e: 48.050 }, { text: "study for another three months", s: 48.050, e: 49.950 }] },

        const player = document.getElementById('player'), displayArea = document.getElementById('display-area'), navList = document.getElementById('nav-list'), sidebar = document.getElementById('sidebar');

        function toggleSidebar() { sidebar.classList.toggle('open'); }
        
        function toggleMemoMode(checked) {
            isMemoMode = checked;
            document.body.classList.toggle('memo-mode-active', checked);
            const activeSub = document.querySelector('.sub-item.active');
            if (activeSub) {
                const group = document.querySelector('.menu-group.expanded');
                if (group) {
                    const wk = group.id.replace('group-', '');
                    const type = activeSub.innerText.toLowerCase().includes('story') ? 'mystory' : 'realconvo';
                    loadContent(wk, type, activeSub);
                }
            }
            stopAll();
        }

        function toggleAccordion(wk) {
            const group = document.getElementById(`group-${wk}`), expanded = group.classList.contains('expanded');
            document.querySelectorAll('.menu-group').forEach(g => g.classList.remove('expanded'));
            if (!expanded) group.classList.add('expanded');
        }

        function loadContent(wk, type, el) {
            const data = studyData[wk]?.[type]; if (!data) return;
            document.querySelectorAll('.sub-item').forEach(s => s.classList.remove('active')); el.classList.add('active');
            if (window.innerWidth <= 768) sidebar.classList.remove('open');
            
            let html = `<h2 class="section-title" onclick="toggleAutoPlayAll(this)"><span>${wk}</span>| ${type === 'mystory' ? 'My Story' : 'Real Conversation'}</h2>`;
            const items = type === 'mystory' ? data.sentences : data.chat;
            items.forEach(item => {
                const chunks = item.chunks.map(c => `<span class="chunk" data-s="${c.s}" data-e="${c.e}">${c.text}</span>`).join(' ');
                const content = `<div class="text-content"><div class="sentence-eng">${chunks}</div><div class="ipa-text">${item.ipa}</div><div class="trans-text">${item.trans}</div></div>`;
                if(type === 'mystory') { html += `<div class="card" data-start="${item.start}" data-end="${item.end}"><div class="play-btn"></div>${content}</div>`; }
                else { html += `<div class="chat-row" data-speaker="${item.speaker}" data-start="${item.start}" data-end="${item.end}"><div class="badge badge-${item.speaker}">${item.speaker}</div><div class="card" style="flex:1; margin:0;">${content}</div></div>`; }
            });
            displayArea.innerHTML = html; 

            // 현재 설정된 배속 버튼의 값을 가져와서 새 음원에도 적용
            const currentSpeedBtn = document.querySelector('.btn-grp .btn.active');
            const currentSpeed = currentSpeedBtn ? parseFloat(currentSpeedBtn.innerText.replace('x', '')) : 1.0;
            
            player.src = data.audio; 
            player.load();
            player.playbackRate = currentSpeed; 

            stopAll();
            if (!isMemoMode) { applyButtonState('.ipa-text', 'btn-ipa'); applyButtonState('.trans-text', 'btn-trans'); }
        }

        function applyButtonState(sel, id) {
            const targetBtn = document.getElementById(id);
            if (targetBtn) {
                const active = targetBtn.classList.contains('active');
                document.querySelectorAll(sel).forEach(el => el.style.display = active ? 'block' : 'none');
            }
        }

        function toggleDisplay(sel, btn) { btn.classList.toggle('active'); applyButtonState(sel, btn.id); }

        displayArea.addEventListener('click', (e) => {
            const card = e.target.closest('.card'), chunk = e.target.closest('.chunk'), playBtn = e.target.closest('.play-btn'), badge = e.target.closest('.badge');
            if (chunk && !isMemoMode) { stopAll(); chunk.classList.add('active'); playPart(parseFloat(chunk.dataset.s), parseFloat(chunk.dataset.e)); return; }
            if (playBtn || badge) {
                const row = e.target.closest('.card, .chat-row');
                if (row.classList.contains('playing')) { player.pause(); row.classList.remove('playing'); } 
                else { stopAll(); if(isMemoMode && card) card.classList.add('show-script'); row.classList.add('playing', 'active-play'); playPart(parseFloat(row.dataset.start), parseFloat(row.dataset.end)); }
                return;
            }
            if (card && isMemoMode) card.classList.toggle('show-script');
        });

        function toggleAutoPlayAll(titleEl) {
    if (isAutoPlaying) stopAll();
    else { 
        stopAll(); isAutoPlaying = true; titleEl.classList.add('playing'); 
        
        // 수정: displayArea 바로 아래에 있는 첫 번째 아이템(.card 또는 .chat-row)만 선택
        const first = displayArea.querySelector(':scope > .card, :scope > .chat-row'); 
        
        if (first) { 
            const cardPart = first.classList.contains('card') ? first : first.querySelector('.card');
            if(isMemoMode && cardPart) cardPart.classList.add('show-script');
            first.classList.add('playing', 'active-play'); 
            playPart(parseFloat(first.dataset.start), parseFloat(first.dataset.end)); 
        } 
    }

        function playPart(s, e) { 
            clearTimeout(window.shadowTimer); 
            const rate = player.playbackRate;
            // 배속에 따라 종료 지점 보정 (느릴수록 더 끝까지 재생)
            stopTime = e - (0.32 * rate); 
            player.currentTime = Math.max(0, s - (0.17 * rate)); 
            player.play(); 
        }

        function stopAll() { 
            player.pause(); isAutoPlaying = false; currentRepeat = 0; stopTime = 0; clearTimeout(window.shadowTimer);
            document.getElementById('current-count').innerText = '';
            document.querySelectorAll('.playing, .active-play, .chunk.active').forEach(el => el.classList.remove('playing', 'active-play', 'active'));
            document.querySelectorAll('.section-title').forEach(t => t.classList.remove('playing'));
        }

        player.addEventListener('timeupdate', () => {
            if (stopTime > 0 && player.currentTime >= stopTime) {
                player.pause(); stopTime = 0; 
                const active = document.querySelector('.card.playing, .chat-row.playing');
                if (active) { 
                    if (isShadowing) handleShadowProcess(active); 
                    else if (isAutoPlaying) handleNext(active); 
                    else active.classList.remove('playing'); 
                }
            }
        });

        function handleShadowProcess(el) {
            currentRepeat++; 
            const limit = parseInt(document.getElementById('repeat-count').value) || 1;
            const rate = player.playbackRate;
            
            // 상단 카운터 업데이트
            document.getElementById('current-count').innerText = `${currentRepeat} / ${limit}`;

            const durationInSec = (parseFloat(el.dataset.end) - parseFloat(el.dataset.start)) / rate;
            const waitTime = durationInSec * 1000; // 2초 추가 삭제, 문장 길이만큼 대기

            if (currentRepeat < limit) { 
                window.shadowTimer = setTimeout(() => playPart(parseFloat(el.dataset.start), parseFloat(el.dataset.end)), waitTime); 
            } else { 
                currentRepeat = 0; 
                document.getElementById('current-count').innerText = '';
                if (isAutoPlaying) window.shadowTimer = setTimeout(() => handleNext(el), waitTime); 
                else el.classList.remove('playing'); 
            }
        }

        function handleNext(el) {
    // 수정: displayArea의 직계 자식인 .card와 .chat-row만 리스트로 만듭니다.
    // 이렇게 해야 Real Conversation에서 내부 카드(.card)가 중복으로 리스트에 담기는 것을 방지합니다.
    const all = Array.from(displayArea.children).filter(child => 
        child.classList.contains('card') || child.classList.contains('chat-row')
    );
    
    const idx = all.indexOf(el); 
    el.classList.remove('playing');
    
    if (idx < all.length - 1) { 
        const next = all[idx+1]; 
        const cardPart = next.classList.contains('card') ? next : next.querySelector('.card');
        
        const rate = player.playbackRate;
        const durationInSec = (parseFloat(el.dataset.end) - parseFloat(el.dataset.start)) / rate;
        const waitTime = durationInSec * 1000;

        window.shadowTimer = setTimeout(() => { 
            if(isMemoMode && cardPart) cardPart.classList.add('show-script');
            next.classList.add('playing', 'active-play'); 
            playPart(parseFloat(next.dataset.start), parseFloat(next.dataset.end)); 
        }, isShadowing ? waitTime : 400); 
    } else { 
        stopAll(); 
    }
}

        function setSpeed(s, btn) { 
            player.playbackRate = s; 
            document.querySelectorAll('.btn-grp .btn').forEach(b => { if(b.innerText.includes('x')) b.classList.remove('active'); }); 
            btn.classList.add('active');

            const menuItems = ["01 Work", "02 Introducing", "03 Personality", "04 Day", "05 Friends", "06 Directions", "07 Dating", "08 Health", "09 My Favorite Food", "10 Travel", "11 Bootcamp", "12 Memories"];

            if (navList) {
                menuItems.forEach((name, idx) => {
                    const wk = (idx + 1).toString().padStart(2, '0');
                    navList.insertAdjacentHTML('beforeend', `
                        <div class="menu-group" id="group-${wk}">
                            <div class="menu-item" onclick="toggleAccordion('${wk}')">
                                <span class="arrow">▶</span> ${name}
                            </div>
                            <div class="sub-menu">
                                <div class="sub-item" onclick="loadContent('${wk}', 'mystory', this)">My story</div>
                                <div class="sub-item" onclick="loadContent('${wk}', 'realconvo', this)">Real Conversation</div>
                            </div>
                        </div>`);
                });
            }
        };
    </script>
</body>
